# Global settings (shared by both if needed)
global:
  domain: "prod.lab.local"

# Settings for the original app
app:
  replicaCount: 3
  image: "my-repo/cicdtest-app:v1.0.0"
  database:
    host: "database-service"
    port: 5432
    user: "app_user"
    dbName: "app_prod"
    secretName: "app-db-secret"

hotel_app:
  replicaCount: 2
  image: "your-registry/hotel-app:latest"
  database:
    host: "database-service.database.svc.cluster.local" # Use FQDN if DB is in another namespace
    port: 5432
    user: "reception_admin"
    dbName: "hotel_prod"
    secretName: "hotel-db-secret"
  
  redis:
    # Use the FQDN to reach across namespaces
    host: "redis-service.redis.svc.cluster.local"
    port: 6379

  keda:
    minReplicas: 1
    maxReplicas: 10
    sessionsPerPod: "25"
