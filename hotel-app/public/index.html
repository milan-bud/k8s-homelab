<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Reception & CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-slate-800 text-white p-4 mb-8 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic">🏨 Grand View Portal</h1>
            <span class="text-slate-400 text-sm">Receptionist Dashboard</span>
        </div>
    </nav>

    <main class="container mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <section class="bg-white rounded-xl shadow-sm border p-6">
            <h2 class="text-xl font-semibold mb-4 text-slate-700 border-b pb-2">Guest CRM</h2>
            <div id="guestList" class="space-y-3 max-h-[500px] overflow-y-auto">
                <p class="text-gray-400 italic">Fetching guests...</p>
            </div>
        </section>

        <section class="bg-white rounded-xl shadow-sm border p-6">
            <h2 class="text-xl font-semibold mb-4 text-slate-700 border-b pb-2">New Reservation</h2>
            <form id="bookingForm" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-500">Guest ID</label>
                    <input type="number" id="guestId" class="w-full p-2 border rounded mt-1" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-500">Room Number</label>
                    <input type="text" id="roomNum" class="w-full p-2 border rounded mt-1" placeholder="e.g. 101" required>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-sm text-gray-500">Check In</label>
                        <input type="date" id="checkIn" class="w-full p-2 border rounded mt-1" required>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500">Check Out</label>
                        <input type="date" id="checkOut" class="w-full p-2 border rounded mt-1" required>
                    </div>
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-2 rounded hover:bg-emerald-700 transition">Create Booking</button>
            </form>
            <div id="bookingStatus" class="mt-4 text-sm font-medium"></div>
        </section>

        <section class="bg-white rounded-xl shadow-sm border p-6">
            <h2 class="text-xl font-semibold mb-4 text-slate-700 border-b pb-2">Billing & Invoices</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-500">Booking ID (from reservation)</label>
                    <input type="number" id="invBookingId" class="w-full p-2 border rounded mt-1" placeholder="Ref #">
                </div>
                <div>
                    <label class="block text-sm text-gray-500">Net Amount (€)</label>
                    <input type="number" step="0.01" id="invAmount" class="w-full p-2 border rounded mt-1" placeholder="0.00">
                </div>
                <button onclick="generateInvoice()" class="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700 transition">Issue Invoice</button>
            </div>
            <div id="invoiceStatus" class="mt-4 p-3 rounded bg-gray-50 hidden border border-blue-100"></div>
        </section>

    </main>

    <script>
        // Fetch Guests for CRM
        async function loadGuests() {
            try {
                const res = await fetch('/api/guests');
                const data = await res.json();
                document.getElementById('guestList').innerHTML = data.map(g => `
                    <div class="p-3 bg-slate-50 rounded border-l-4 border-slate-400">
                        <div class="font-bold text-slate-800">ID: ${g.id} - ${g.first_name} ${g.last_name}</div>
                        <div class="text-xs text-slate-500">${g.email}</div>
                    </div>
                `).join('');
            } catch (e) { console.error("Error loading CRM data"); }
        }

        // Handle Booking Form
        document.getElementById('bookingForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                guest_id: document.getElementById('guestId').value,
                room_num: document.getElementById('roomNum').value,
                check_in: document.getElementById('checkIn').value,
                check_out: document.getElementById('checkOut').value
            };
            const res = await fetch('/api/bookings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const statusDiv = document.getElementById('bookingStatus');
            if(res.ok) {
                const data = await res.json();
                statusDiv.className = "mt-4 text-sm font-medium text-emerald-600";
                statusDiv.innerText = `Success! Booking ID is: ${data.id}`;
                document.getElementById('bookingForm').reset();
            } else {
                statusDiv.className = "mt-4 text-sm font-medium text-red-600";
                statusDiv.innerText = "Error creating booking.";
            }
        };

        // Handle Invoice Generation
        async function generateInvoice() {
            const booking_id = document.getElementById('invBookingId').value;
            const amount_net = document.getElementById('invAmount').value;
            const statusDiv = document.getElementById('invoiceStatus');

            const res = await fetch('/api/invoices', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ booking_id, amount_net })
            });

            statusDiv.classList.remove('hidden');
            if(res.ok) {
                const data = await res.json();
                statusDiv.innerHTML = `<p class="text-blue-800 font-bold">Invoice #${data.id} Issued</p>
                                       <p class="text-xs text-blue-600">Total (inc. tax): €${data.total_amount}</p>`;
            } else {
                statusDiv.innerHTML = `<p class="text-red-600 font-bold">Failed to issue invoice.</p>`;
            }
        }

        loadGuests();
    </script>
</body>
</html>
