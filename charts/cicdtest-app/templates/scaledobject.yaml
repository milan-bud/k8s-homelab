apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ .Release.Name }}-scaler
  namespace: test 
spec:
  scaleTargetRef:
    name: {{ .Release.Name }} 
  pollingInterval: 5
  cooldownPeriod:  30
  minReplicaCount: 0  # It should scale to zero if the list is empty
  maxReplicaCount: 5
  triggers:
  - type: redis
    metadata:
      # Pattern: <service-name>.<namespace>.svc.cluster.local:6379
      address: redis-master.redis.svc.cluster.local:6379
      listName: "task_queue"
      listLength: "5"
